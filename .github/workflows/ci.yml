# CI workflow for the edomata fork (beyond-scale-group/edomata).
# Runs build, test, formatting checks, site generation, and steward validation.

name: Continuous Integration

on:
  pull_request:
    branches: ['**', '!update/**', '!pr/**']
  push:
    branches: ['**', '!update/**', '!pr/**']

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }} @ ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-22.04]
        scala: [3]
        java: [temurin@8, temurin@17]
        project: [rootJS, rootJVM, rootNative]
        exclude:
          - project: rootJS
            java: temurin@17
          - project: rootNative
            java: temurin@17
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v17

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Start up Postgres
        run: docker compose up -d

      - name: Check headers and formatting
        if: matrix.java == 'temurin@8' && matrix.project == 'rootJVM'
        run: >-
          nix develop .#${{ matrix.java }} -c sbt
          'project ${{ matrix.project }}'
          '++ ${{ matrix.scala }}'
          headerCheckAll scalafmtCheckAll
          'project /'
          scalafmtSbtCheck

      - name: scalaJSLink
        if: matrix.project == 'rootJS'
        run: >-
          nix develop .#${{ matrix.java }} -c sbt
          'project ${{ matrix.project }}'
          '++ ${{ matrix.scala }}'
          Test/scalaJSLinkerResult

      - name: nativeLink
        if: matrix.project == 'rootNative'
        run: >-
          nix develop .#${{ matrix.java }} -c sbt
          'project ${{ matrix.project }}'
          '++ ${{ matrix.scala }}'
          Test/nativeLink

      - name: Test
        run: >-
          nix develop .#${{ matrix.java }} -c sbt
          'project ${{ matrix.project }}'
          '++ ${{ matrix.scala }}'
          test

      - name: Check binary compatibility
        if: matrix.java == 'temurin@8'
        run: >-
          nix develop .#${{ matrix.java }} -c sbt
          'project ${{ matrix.project }}'
          '++ ${{ matrix.scala }}'
          mimaReportBinaryIssues

      - name: Generate API documentation
        if: matrix.java == 'temurin@8'
        run: >-
          nix develop .#${{ matrix.java }} -c sbt
          'project ${{ matrix.project }}'
          '++ ${{ matrix.scala }}'
          doc

  post-build:
    name: post build
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - name: post build
        run: echo success!

  site:
    name: Generate Site
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v17

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Generate site
        run: nix develop .#temurin@17 -c sbt docs/tlSite

      - name: Publish site
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/target/docs/site
          keep_files: true

  validate-steward:
    name: Validate Steward Config
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout current branch (fast)
        uses: actions/checkout@v5

      - name: Setup Java (temurin@11)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11

      - uses: coursier/setup-action@v1
        with:
          apps: scala-steward

      - run: scala-steward validate-repo-config .scala-steward.conf
